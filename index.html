<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - AECO + M70S+ (Live)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .widget-value { font-size: 2.65rem; line-height: 1.05; font-weight: 600; font-family: monospace; }
    @media (max-width: 640px) { .widget-value { font-size: 2.05rem; } }

    .widget-card { position: relative; }
    .widget-card .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      z-index: 50;
      opacity: 0;
      transition: all 0.2s ease;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      margin-bottom: 10px;
      white-space: pre-line;
      width: max-content;
      max-width: 420px;
    }
    .widget-card:hover .tooltip,
    .widget-card:active .tooltip {
      visibility: visible;
      opacity: 1;
    }

    .sats-unit { color: #f97316; font-weight: 500; }
    .cad-unit  { color: #f87171; font-weight: 500; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="text-center text-gray-500 text-xs mb-2">
      Version 2026-04-10 • 5.7% Monthly BTC Growth (Fixed)
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-6" id="cards"></div>
  </div>

  <script>
    let btcPrice = 71889;
    let wtiPrice = 96.78;
    let aecoPrice = 1.78;

    const GAS_VOLUME_M3_PER_DAY = 20000;
    const M70S_HASHRATE = 244;
    const M70S_POWER_KW = 3.14;
    const BASE_INVEST_CAD = 12500000;
    const GJ_PER_E3M3 = 44;
    const TURBINE_EFFICIENCY = 0.30;
    const MONTHLY_BTC_GROWTH = 0.057;   // 5.7% per month

    const SQM_PER_MINER = 0.12;
    const BASE_SATS_PER_TH = 45;

    function calculateAllMetrics() {
      const gjPerDay = GAS_VOLUME_M3_PER_DAY * (GJ_PER_E3M3 / 1000);
      const totalKwhPerDay = gjPerDay * 277.8;
      const totalPowerKW_thermal = totalKwhPerDay / 24;
      const totalPowerKW = totalPowerKW_thermal * TURBINE_EFFICIENCY;
      const minersSupported = Math.floor(totalPowerKW / M70S_POWER_KW);

      const dailySatsPerMiner = Math.round(M70S_HASHRATE * BASE_SATS_PER_TH);
      const totalDailySats = minersSupported * dailySatsPerMiner;
      const satsPerGJ = Math.round(totalDailySats / gjPerDay);

      return { minersSupported, totalDailySats, satsPerGJ, totalPowerMW: (totalPowerKW / 1000).toFixed(2), sqMeters: Math.round(minersSupported * SQM_PER_MINER) };
    }

    function getMonthlyGrowthBtcPrice(months) {
      if (months <= 0) return btcPrice;
      return Math.round(btcPrice * Math.pow(1 + MONTHLY_BTC_GROWTH, months));
    }

    function getSetupMetrics() {
      const m = calculateAllMetrics();
      let totalDailySats = m.totalDailySats;

      // Simple iterative payback with monthly growth
      let cumulativeCAD = 0;
      let months = 0;
      const dailySats = totalDailySats;

      while (cumulativeCAD < BASE_INVEST_CAD && months < 120) {
        months += 1;
        const projectedBTC = getMonthlyGrowthBtcPrice(months);
        const dailyRevUSD = (dailySats / 100000000) * projectedBTC;
        const dailyRevCAD = dailyRevUSD * 1.39;
        const monthlyRevCAD = dailyRevCAD * 30.437;
        cumulativeCAD += monthlyRevCAD;
      }

      return { totalDailySats: Math.round(totalDailySats), paybackMonths: months.toFixed(1) };
    }

    function calculateBtcPriceFor8MonthPayback() {
      const m = calculateAllMetrics();
      const totalDailySats = m.totalDailySats;
      const requiredDailyRevCAD = BASE_INVEST_CAD / 8;
      const requiredDailyRevUSD = (requiredDailyRevCAD / 1.39) / 30;
      return Math.round((requiredDailyRevUSD * 100000000) / totalDailySats);
    }

    function satsPerGJ_AECO() {
      return btcPrice > 0 ? Math.round((aecoPrice / btcPrice) * 100000000) : 0;
    }

    function formatNumber(num) { return (num || 0).toLocaleString('en-US'); }
    function formatCAD(num) { return 'C$' + num.toLocaleString('en-US'); }

    function createWidgets() {
      const baseNow = getSetupMetrics();
      const m = calculateAllMetrics();
      const miningBase = m.satsPerGJ;
      const multiplier = (miningBase / satsPerGJ_AECO()).toFixed(1) || "—";
      const btcFor8Month = calculateBtcPriceFor8MonthPayback();

      const items = [
        { code: "WTI", label: "WTI", color: "emerald", value: formatNumber(Math.round((wtiPrice / btcPrice) * 1e8)), unit: "SATS / bbl", tooltip: `WTI: $${wtiPrice.toFixed(2)} / bbl\nLive BTC: $${btcPrice.toLocaleString()}` },
        { code: "AECO", label: "AECO Alberta", color: "amber", value: formatNumber(satsPerGJ_AECO()), unit: "SATS / GJ", tooltip: `AECO: C$${aecoPrice.toFixed(2)} / GJ (last daily open)` },

        { code: "MINING", label: "M70S+ Mining Revenue", color: "sky", value: formatNumber(miningBase), unit: `<span class="sats-unit">SATS / GJ (Base)</span>`, tooltip: `973 miners × 10,980 sats/miner/day ÷ 880 GJ/day = 12,140 SATS/GJ` },

        { code: "MULTIPLIER", label: "Mining Multiplier", color: "violet", value: multiplier, unit: "×", tooltip: `Mining revenue vs selling raw AECO gas (Base case)` },

        { code: "DAILY_NOW", label: "Daily Sats (Base Case)", color: "cyan", value: formatNumber(m.totalDailySats), unit: `<span class="sats-unit">SATS/day</span>`, tooltip: `973 M70S+ miners × 10,980 sats/miner/day = 10,683,540 SATS/day` },

        { code: "POWER", label: "Power Required", color: "blue", value: m.totalPowerMW, unit: "MW", tooltip: `Realistic sour gas turbine output at 30% efficiency` },

        { code: "BASE_INVEST", label: "Base Investment", color: "rose", value: formatCAD(BASE_INVEST_CAD), unit: "CAD", tooltip: `Conservative C$12.5M (ASICS + turbines + infrastructure)` },

        { code: "FOOTPRINT", label: "Physical Footprint", color: "emerald", value: formatNumber(m.sqMeters), unit: "m²", tooltip: `Space for 973 M70S+ miners (~0.12 m² each)` },

        { code: "BTC_8MONTH", label: "BTC Price for 8 Month Payback", color: "amber", value: formatNumber(btcFor8Month), unit: "USD", tooltip: `BTC price needed for exactly 8 months payback (Base case)` },

        { code: "PAYBACK", label: "Payback Period", color: "lime", value: baseNow.paybackMonths, unit: "Base Case (months)", tooltip: `5.7% monthly BTC price increase (compounded from live price)\nBase case only • Switches to post-halving after 24 months if needed` }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";
      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `widget-card bg-gray-900 border border-gray-800 rounded-3xl p-6 sm:p-8 hover:border-${item.color}-400 transition-all active:scale-[0.985]`;
        card.innerHTML = `
          <div class="uppercase tracking-widest text-xs sm:text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="val-${item.code}" class="widget-value mt-4 sm:mt-6">${item.value}</div>
          <div class="text-xs mt-2" id="unit-${item.code}">${item.unit}</div>
          <div class="tooltip">${item.tooltip}</div>
        `;
        container.appendChild(card);
      });
    }

    function updateDashboard() {
      createWidgets();
      const m = calculateAllMetrics();
      console.log(`✅ Dashboard updated → Daily Sats: ${m.totalDailySats} | Mining Revenue: ${m.satsPerGJ} | Miners: ${m.minersSupported}`);
    }

    function init() {
      updateDashboard();
    }

    init();
    setInterval(updateDashboard, 300000);
  </script>
</body>
</html>
