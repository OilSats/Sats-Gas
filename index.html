<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - AECO + M70S+ (Live)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .widget-value { font-size: 2.65rem; line-height: 1.05; font-weight: 600; font-family: monospace; }
    @media (max-width: 640px) { .widget-value { font-size: 2.05rem; } }

    .widget-card { position: relative; }
    .widget-card .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      z-index: 50;
      opacity: 0;
      transition: all 0.2s ease;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      margin-bottom: 10px;
      white-space: pre-line;
      width: max-content;
      max-width: 420px;
    }
    .widget-card:hover .tooltip,
    .widget-card:active .tooltip {
      visibility: visible;
      opacity: 1;
    }

    .sats-unit { color: #f97316; font-weight: 500; }
    .cad-unit  { color: #f87171; font-weight: 500; }
    .footprint-unit { color: #4ade80; font-weight: 500; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="text-center text-gray-500 text-xs mb-2">
      Version 2026-04-10 • 973 Miners • 10,683,540 SATS/day • 12,140 SATS/GJ
    </div>

    <div id="last-updated" class="text-center text-gray-500 text-xs mb-6">
      Last updated: never
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-6" id="cards"></div>
  </div>

  <script>
    let btcPrice = 71889;
    let wtiPrice = 96.78;
    let aecoPrice = 1.78;

    const ZERO_DAY = new Date("2011-01-05").getTime();
    const POWER_LAW_EXPONENT = 5.8;

    const GAS_VOLUME_M3_PER_DAY = 20000;
    const M70S_HASHRATE = 244;
    const M70S_POWER_KW = 3.14;
    const BASE_INVEST_CAD = 12500000;
    const GJ_PER_E3M3 = 44;
    const TURBINE_EFFICIENCY = 0.30;

    const SQM_PER_MINER = 0.12;
    const BASE_SATS_PER_TH = 45;

    async function fetchLivePrices() {
      console.log("=== Fetching live prices ===");
      try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd", { cache: "no-store" });
        if (res.ok) {
          const data = await res.json();
          if (data.bitcoin?.usd) btcPrice = Math.round(data.bitcoin.usd);
        }
      } catch (e) {}
      document.getElementById("last-updated").textContent = `Last updated: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    }

    function getGasPoweredMetrics() {
      const gjPerDay = GAS_VOLUME_M3_PER_DAY * (GJ_PER_E3M3 / 1000);
      const totalKwhPerDay = gjPerDay * 277.8;
      const totalPowerKW_thermal = totalKwhPerDay / 24;
      const totalPowerKW = totalPowerKW_thermal * TURBINE_EFFICIENCY;
      const totalPowerMW = (totalPowerKW / 1000).toFixed(2);
      const minersSupported = Math.floor(totalPowerKW / M70S_POWER_KW);
      const sqMeters = Math.round(minersSupported * SQM_PER_MINER);
      return { minersSupported, sqMeters, totalPowerMW };
    }

    function dailySatsMinedPerUnit(isPostHalving = false) {
      let base = BASE_SATS_PER_TH;
      if (isPostHalving) base = Math.round(base * 0.55);
      return Math.round(M70S_HASHRATE * base);
    }

    function satsPerGJ_AECO() {
      return btcPrice > 0 ? Math.round((aecoPrice / btcPrice) * 100000000) : 0;
    }

    function satsPerGJ_Mining(isPostHalving = false) {
      const { minersSupported } = getGasPoweredMetrics();
      const dailySats = minersSupported * dailySatsMinedPerUnit(isPostHalving);
      const gjPerDay = GAS_VOLUME_M3_PER_DAY * (GJ_PER_E3M3 / 1000);
      return Math.round(dailySats / gjPerDay);
    }

    function getPowerLawBtcPrice(monthsFromNow) {
      if (monthsFromNow <= 0) return btcPrice;
      const now = new Date().getTime();
      const currentDays = (now - ZERO_DAY) / (1000 * 60 * 60 * 24);
      const futureDate = new Date(now + monthsFromNow * 30.437 * 24 * 60 * 60 * 1000);
      const futureDays = (futureDate.getTime() - ZERO_DAY) / (1000 * 60 * 60 * 24);
      const ratio = futureDays / currentDays;
      return Math.round(btcPrice * Math.pow(ratio, POWER_LAW_EXPONENT));
    }

    function getSetupMetrics() {
      const { minersSupported } = getGasPoweredMetrics();
      let isPostHalving = false;
      let dailySatsPerMiner = dailySatsMinedPerUnit(false);

      let totalDailySats = minersSupported * dailySatsPerMiner;
      let dailyRevUSD = (totalDailySats / 100000000) * btcPrice;
      let paybackMonths = dailyRevUSD > 0 
        ? ((BASE_INVEST_CAD / (dailyRevUSD * 1.39)) / 30) 
        : 999;

      if (paybackMonths > 24) {
        isPostHalving = true;
        dailySatsPerMiner = dailySatsMinedPerUnit(true);
        totalDailySats = minersSupported * dailySatsPerMiner;
      }

      const projectedBtcPrice = getPowerLawBtcPrice(paybackMonths);
      dailyRevUSD = (totalDailySats / 100000000) * projectedBtcPrice;
      paybackMonths = (BASE_INVEST_CAD / (dailyRevUSD * 1.39)) / 30;

      return { totalDailySats: Math.round(totalDailySats), paybackMonths: paybackMonths.toFixed(1) };
    }

    function calculateBtcPriceFor8MonthPayback() {
      const { minersSupported } = getGasPoweredMetrics();
      const dailySatsPerMiner = dailySatsMinedPerUnit(false);
      const totalDailySats = minersSupported * dailySatsPerMiner;

      const months = 8;
      const requiredDailyRevCAD = BASE_INVEST_CAD / months;
      const requiredDailyRevUSD = (requiredDailyRevCAD / 1.39) / 30;

      const requiredBtcPrice = (requiredDailyRevUSD * 100000000) / totalDailySats;
      return Math.round(requiredBtcPrice);
    }

    function formatNumber(num) { return (num || 0).toLocaleString('en-US'); }
    function formatCAD(num) { return 'C$' + num.toLocaleString('en-US'); }

    function createWidgets() {
      const baseNow = getSetupMetrics();
      const miningBase = satsPerGJ_Mining(false);
      const multiplier = (miningBase / satsPerGJ_AECO()).toFixed(1) || "—";
      const btcFor8Month = calculateBtcPriceFor8MonthPayback();

      const { minersSupported, sqMeters, totalPowerMW } = getGasPoweredMetrics();

      const items = [
        { code: "WTI", label: "WTI", color: "emerald", value: formatNumber(Math.round((wtiPrice / btcPrice) * 1e8)), unit: "SATS / bbl", tooltip: `WTI: $${wtiPrice.toFixed(2)} / bbl (last daily open)` },
        { code: "AECO", label: "AECO Alberta", color: "amber", value: formatNumber(satsPerGJ_AECO()), unit: "SATS / GJ", tooltip: `AECO: C$${aecoPrice.toFixed(2)} / GJ (last daily open)` },

        { code: "MINING", label: "M70S+ Mining Revenue", color: "sky", 
          value: formatNumber(miningBase), 
          unit: `<span class="sats-unit">SATS / GJ (Base)</span>`, 
          tooltip: `973 miners × 10,980 sats/miner/day ÷ 880 GJ/day = 12,140 SATS/GJ` },

        { code: "MULTIPLIER", label: "Mining Multiplier", color: "violet", value: multiplier, unit: "×", 
          tooltip: `Mining revenue vs selling raw AECO gas (Base case)` },

        { code: "DAILY_NOW", label: "Daily Sats (Base Case)", color: "cyan", 
          value: formatNumber(baseNow.totalDailySats), 
          unit: `<span class="sats-unit">SATS/day</span>`, 
          tooltip: `973 M70S+ miners × 10,980 sats/miner/day = 10,683,540 SATS/day` },

        { code: "POWER", label: "Power Required", color: "blue", 
          value: totalPowerMW, 
          unit: "MW", 
          tooltip: `Realistic sour gas turbine output at 30% efficiency` },

        { code: "BASE_INVEST", label: "Base Investment", color: "rose", 
          value: formatCAD(BASE_INVEST_CAD), 
          unit: "CAD", 
          tooltip: `Conservative C$12.5M (ASICS + turbines + infrastructure)` },

        { code: "FOOTPRINT", label: "Physical Footprint", color: "emerald", 
          value: formatNumber(sqMeters), 
          unit: "m²", 
          tooltip: `Space for 973 M70S+ miners (~0.12 m² each)` },

        { code: "BTC_8MONTH", label: "BTC Price for 8 Month Payback", color: "amber", 
          value: formatNumber(btcFor8Month), 
          unit: "USD", 
          tooltip: `BTC price needed for exactly 8 months payback (Base case, 30 days/month)` },

        { code: "PAYBACK", label: "Payback Period", color: "lime", 
          value: baseNow.paybackMonths, 
          unit: "Base Case (months)", 
          tooltip: `Bitbo Power Law (Zero Day 2011-01-05, exponent 5.8)\nBase case only • Switches to post-halving after 24 months if needed\n~250k in Sep 2027` }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";
      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `widget-card bg-gray-900 border border-gray-800 rounded-3xl p-6 sm:p-8 hover:border-${item.color}-400 transition-all active:scale-[0.985]`;
        card.innerHTML = `
          <div class="uppercase tracking-widest text-xs sm:text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="val-${item.code}" class="widget-value mt-4 sm:mt-6">${item.value}</div>
          <div class="text-xs mt-2" id="unit-${item.code}">${item.unit}</div>
          <div class="tooltip">${item.tooltip}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateDashboard() {
      await fetchLivePrices();
      createWidgets();
    }

    async function init() {
      await updateDashboard();
    }

    init();
    setInterval(updateDashboard, 300000);
  </script>
</body>
</html>
