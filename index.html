<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil Sats - AECO + M70S+ (Live)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .widget-value { font-size: 2.65rem; line-height: 1.05; font-weight: 600; font-family: monospace; }
    @media (max-width: 640px) { .widget-value { font-size: 2.05rem; } }

    .widget-card { position: relative; }
    .widget-card .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      z-index: 50;
      opacity: 0;
      transition: all 0.2s ease;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      margin-bottom: 10px;
      white-space: pre-line;
      width: max-content;
      max-width: 420px;
    }
    .widget-card:hover .tooltip,
    .widget-card:active .tooltip {
      visibility: visible;
      opacity: 1;
    }

    .sats-unit { color: #f97316; font-weight: 500; }
    .cad-unit  { color: #f87171; font-weight: 500; }
    .footprint-unit { color: #4ade80; font-weight: 500; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
    <div class="text-center text-gray-500 text-xs mb-2">
      Version 2026-04-09 • Sour Gas Turbines • Conservative Estimates • BTC Power Law R² = 0.955
    </div>

    <div id="last-updated" class="text-center text-gray-500 text-xs mb-6">
      Last updated: never
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-6" id="cards"></div>
  </div>

  <script>
    let btcPrice = 71889;               // Live spot price — Zero Day is always today
    let powerLawPrice = 250000;         // Conservative Power Law projection for long-term
    let wtiPrice = 96.78;
    let aecoPrice = 1.78;

    const GAS_VOLUME_M3_PER_DAY = 20000;
    const M70S_HASHRATE = 244;
    const M70S_POWER_KW = 3.14;
    const BASE_INVEST_CAD = 12500000;
    const GJ_PER_E3M3 = 44;

    const SQM_PER_MINER = 0.12;

    const BEAR_SATS_PER_TH = 35;
    const BASE_SATS_PER_TH = 45;
    const BULL_SATS_PER_TH = 55;

    async function fetchLivePrices() {
      console.log("=== Fetching live prices ===");

      try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd", { cache: "no-store" });
        if (res.ok) {
          const data = await res.json();
          if (data.bitcoin?.usd) btcPrice = Math.round(data.bitcoin.usd);
        }
      } catch (e) { console.warn("BTC fetch failed"); }

      try {
        const res = await fetch("https://www.alphavantage.co/query?function=WTI&apikey=demo");
        if (res.ok) {
          const data = await res.json();
          if (data.data && data.data[0] && data.data[0].value) wtiPrice = parseFloat(data.data[0].value);
        }
      } catch (e) { console.warn("WTI fetch failed"); }

      console.log("AECO using last daily open value");

      document.getElementById("last-updated").textContent = `Last updated: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    }

    function getGasPoweredMetrics() {
      const gjPerDay = GAS_VOLUME_M3_PER_DAY * (GJ_PER_E3M3 / 1000);
      const totalPowerKW = (gjPerDay * 1000) / 277.8;
      const totalPowerMW = (totalPowerKW / 1000).toFixed(2);
      const minersSupported = Math.floor(totalPowerKW / M70S_POWER_KW);
      const sqMeters = Math.round(minersSupported * SQM_PER_MINER);
      return { minersSupported, sqMeters, totalPowerMW };
    }

    function dailySatsMinedPerUnit(scenario, isPostHalving = false) {
      let base;
      if (scenario === "bear") base = BEAR_SATS_PER_TH;
      else if (scenario === "bull") base = BULL_SATS_PER_TH;
      else base = BASE_SATS_PER_TH;

      if (isPostHalving) base = Math.round(base * 0.55);
      return Math.round(M70S_HASHRATE * base);
    }

    function satsPerGJ_AECO() {
      return btcPrice > 0 ? Math.round((aecoPrice / btcPrice) * 100000000) : 0;
    }

    function satsPerGJ_Mining(scenario, isPostHalving = false) {
      const dailyKwh = M70S_POWER_KW * 24;
      const gjPerDay = dailyKwh / 277.8;
      const dailySats = dailySatsMinedPerUnit(scenario, isPostHalving);
      return Math.round(dailySats / gjPerDay);
    }

    function getSetupMetrics(scenario, isPostHalving = false) {
      const { minersSupported } = getGasPoweredMetrics();
      let dailySatsPerMiner = dailySatsMinedPerUnit(scenario, isPostHalving);
      let totalDailySats = minersSupported * dailySatsPerMiner;

      let usedBtcPrice = isPostHalving ? powerLawPrice : btcPrice;
      let dailyRevUSD = (totalDailySats / 100000000) * usedBtcPrice;
      let paybackMonths = dailyRevUSD > 0 
        ? ((BASE_INVEST_CAD / (dailyRevUSD * 1.39)) / 30) 
        : 999;

      // Bear rule: use pre-halving up to 24 months, then switch to post-halving if longer
      if (scenario === "bear" && paybackMonths > 24 && !isPostHalving) {
        dailySatsPerMiner = dailySatsMinedPerUnit("bear", true);
        totalDailySats = minersSupported * dailySatsPerMiner;
        dailyRevUSD = (totalDailySats / 100000000) * powerLawPrice;
        paybackMonths = (BASE_INVEST_CAD / (dailyRevUSD * 1.39)) / 30;
      }

      return { totalDailySats: Math.round(totalDailySats), paybackMonths: paybackMonths.toFixed(1) };
    }

    function formatNumber(num) { return (num || 0).toLocaleString('en-US'); }
    function formatCAD(num) { return 'C$' + num.toLocaleString('en-US'); }

    function createWidgets() {
      const bearNow = getSetupMetrics("bear", false);
      const baseNow = getSetupMetrics("base", false);
      const bullNow = getSetupMetrics("bull", false);

      const miningBase = satsPerGJ_Mining("base");
      const multiplier = (miningBase / satsPerGJ_AECO()).toFixed(1) || "—";

      const { minersSupported, sqMeters, totalPowerMW } = getGasPoweredMetrics();

      const items = [
        { code: "WTI", label: "WTI", color: "emerald", value: formatNumber(Math.round((wtiPrice / btcPrice) * 1e8)), unit: "SATS / bbl", tooltip: `WTI: $${wtiPrice.toFixed(2)} / bbl (last daily open)\nBTC: $${btcPrice.toLocaleString()} / BTC` },
        { code: "AECO", label: "AECO Alberta", color: "amber", value: formatNumber(satsPerGJ_AECO()), unit: "SATS / GJ", tooltip: `AECO: C$${aecoPrice.toFixed(2)} / GJ (last daily open)` },

        { code: "MINING", label: "M70S+ Mining Revenue", color: "sky", 
          value: formatNumber(miningBase), 
          unit: `<span class="sats-unit">SATS / GJ (Base Case)</span>`, 
          tooltip: `Base case: 45 sats/TH/s/day (~$32.55 USD/PH/s)\nMining revenue per GJ using own gas with M70S+ ASICs\n(using 44 GJ per e³m³ gas energy content)` },

        { code: "MULTIPLIER", label: "Mining Multiplier", color: "violet", value: multiplier, unit: "×", 
          tooltip: `Mining revenue vs selling raw AECO gas\n(Base case only)` },

        { code: "DAILY_NOW", label: "Daily Sats (Now)", color: "cyan", 
          value: `${formatNumber(bearNow.totalDailySats)}   ${formatNumber(baseNow.totalDailySats)}   ${formatNumber(bullNow.totalDailySats)}`, 
          unit: `<span class="sats-unit">SATS/day (Bear / Base / Bull)</span>`, 
          tooltip: `Bear: 35 sats/TH/s/day ($25 USD/PH/s) | Base: 45 sats/TH/s/day (~$32.55 USD/PH/s) | Bull: 55 sats/TH/s/day\nSource: bitcoin-hashprice-index-20260409.csv (April 2026) + Braiins chart` },

        { code: "DAILY_POST", label: "Daily Sats (Post 2028)", color: "purple", 
          value: `${formatNumber(bearNow.totalDailySats * 0.55)}   ${formatNumber(baseNow.totalDailySats * 0.55)}   ${formatNumber(bullNow.totalDailySats * 0.55)}`, 
          unit: `<span class="sats-unit">SATS/day (Bear / Base / Bull)</span>`, 
          tooltip: `55% hashprice reduction after 2028 halving` },

        { code: "POWER", label: "Power Required", color: "blue", 
          value: totalPowerMW, 
          unit: `<span class="power-unit">MW</span>`, 
          tooltip: `Total electrical power required\n(using 44 GJ per e³m³ gas energy content)` },

        { code: "BASE_INVEST", label: "Base Investment", color: "rose", 
          value: formatCAD(BASE_INVEST_CAD), 
          unit: `<span class="cad-unit">CAD</span>`, 
          tooltip: `Conservative estimate covering:\n• ASICS (M70S+ miners)\n• Sour Gas Turbines + Skids\n• Data Center Infrastructure\nTotal: C$12.5M (actual expected lower)` },

        { code: "FOOTPRINT", label: "Physical Footprint", color: "emerald", value: formatNumber(sqMeters), unit: `<span class="footprint-unit">m²</span>`, tooltip: `Space required for ${formatNumber(minersSupported)} M70S+ miners\n(~0.12 m² per miner including racking & airflow)` },

        { code: "PAYBACK", label: "Payback Period", color: "lime", 
          value: `${bearNow.paybackMonths}<br>${baseNow.paybackMonths}<br>${bullNow.paybackMonths}`, 
          unit: "Bear<br>Base<br>Bull (months)", 
          tooltip: `Bitcoin Power Law: Price ≈ A × (time since 2009)^5.8 (R² ≈ 0.955)\n• Bear: pre-halving sats up to 24 months, then switches to post-halving if longer\n• Base & Bull: always use pre-halving sats\nZero Day = today (live BTC price)` }
      ];

      const container = document.getElementById("cards");
      container.innerHTML = "";
      items.forEach(item => {
        const card = document.createElement("div");
        card.className = `widget-card bg-gray-900 border border-gray-800 rounded-3xl p-6 sm:p-8 hover:border-${item.color}-400 transition-all active:scale-[0.985]`;
        card.innerHTML = `
          <div class="uppercase tracking-widest text-xs sm:text-sm font-medium text-${item.color}-400">${item.label}</div>
          <div id="val-${item.code}" class="widget-value mt-4 sm:mt-6">${item.value}</div>
          <div class="text-xs mt-2" id="unit-${item.code}">${item.unit}</div>
          <div class="tooltip">${item.tooltip}</div>
        `;
        container.appendChild(card);
      });
    }

    async function updateDashboard() {
      await fetchLivePrices();
      createWidgets();
      console.log(`Dashboard updated → WTI: $${wtiPrice.toFixed(2)} | AECO: C$${aecoPrice.toFixed(2)} | BTC: $${btcPrice}`);
    }

    async function init() {
      await updateDashboard();
    }

    init();
    setInterval(updateDashboard, 300000);
  </script>
</body>
</html>
